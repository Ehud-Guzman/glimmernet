<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00c853" />
  <title>No Connection — WiFi Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #00c853; --bg: #0e0e0e; --surface: #1a1a1a; --text: #f1f5f9; --text-3: #64748b; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--surface); border-radius: 20px; padding: 2.5rem 2rem;
      max-width: 360px; width: 100%; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(0,200,83,0.12); border: 2px solid rgba(0,200,83,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.88rem; color: var(--text-3); line-height: 1.6; margin-bottom: 1.75rem; }
    button {
      background: var(--accent); color: #fff; border: none; border-radius: 12px;
      padding: 0.85rem 2rem; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; width: 100%; font-family: inherit;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    .hint { font-size: 0.75rem; color: var(--text-3); margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00c853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#00c853" stroke="none"/>
      </svg>
    </div>
    <h1>No connection</h1>
    <p>You're currently offline. Check your network connection and try again — your session is safe and will resume when you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="hint">If this device has an active session, reconnect to the WiFi network first.</p>
  </div>
</body>
</html>
