[build]
  command = "npm run build"
  publish = "dist"

# Proxy all API calls to the Render backend (no code changes needed)
[[redirects]]
  from = "/api/*"
  to = "https://glimmernet.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — every route returns index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
